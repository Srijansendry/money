openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Personal Productivity Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tasks
    description: Task management
  - name: habits
    description: Habit tracking
  - name: finances
    description: Financial tracking
  - name: tags
    description: Custom tags/categories
  - name: stats
    description: User stats, streaks and gamification
  - name: pdf
    description: PDF parsing
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── TASKS ──────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, missed, all]
        - name: date
          in: query
          schema:
            type: string
            description: Filter by due date (YYYY-MM-DD)
        - name: tagId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/{id}/complete:
    patch:
      operationId: completeTask
      tags: [tasks]
      summary: Mark task as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/reschedule:
    patch:
      operationId: rescheduleTask
      tags: [tasks]
      summary: Reschedule a missed or pending task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RescheduleInput"
      responses:
        "200":
          description: Rescheduled task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/summary:
    get:
      operationId: getTaskSummary
      tags: [tasks]
      summary: Get today's task summary counts
      responses:
        "200":
          description: Task summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSummary"

  # ── HABITS ─────────────────────────────────────────────────────────────────
  /habits:
    get:
      operationId: listHabits
      tags: [habits]
      summary: List all habits
      responses:
        "200":
          description: List of habits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Habit"
    post:
      operationId: createHabit
      tags: [habits]
      summary: Create a habit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HabitInput"
      responses:
        "201":
          description: Created habit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"

  /habits/{id}:
    patch:
      operationId: updateHabit
      tags: [habits]
      summary: Update a habit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HabitUpdate"
      responses:
        "200":
          description: Updated habit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"
    delete:
      operationId: deleteHabit
      tags: [habits]
      summary: Delete a habit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /habits/{id}/check:
    post:
      operationId: checkHabit
      tags: [habits]
      summary: Mark habit as done for today
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated habit with streak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"

  # ── FINANCES ───────────────────────────────────────────────────────────────
  /finances:
    get:
      operationId: listFinances
      tags: [finances]
      summary: List financial entries
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expense, all]
        - name: month
          in: query
          schema:
            type: string
            description: Filter by month (YYYY-MM)
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of financial entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FinanceEntry"
    post:
      operationId: createFinanceEntry
      tags: [finances]
      summary: Create a financial entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinanceInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceEntry"

  /finances/{id}:
    patch:
      operationId: updateFinanceEntry
      tags: [finances]
      summary: Update a financial entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinanceUpdate"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceEntry"
    delete:
      operationId: deleteFinanceEntry
      tags: [finances]
      summary: Delete a financial entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /finances/monthly-summary:
    get:
      operationId: getMonthlySummary
      tags: [finances]
      summary: Get monthly spending breakdown by category
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            description: Month in YYYY-MM format
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlySummary"

  # ── TAGS ───────────────────────────────────────────────────────────────────
  /tags:
    get:
      operationId: listTags
      tags: [tags]
      summary: List all tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      operationId: createTag
      tags: [tags]
      summary: Create a custom tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Created tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"

  /tags/{id}:
    delete:
      operationId: deleteTag
      tags: [tags]
      summary: Delete a tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── STATS ──────────────────────────────────────────────────────────────────
  /stats:
    get:
      operationId: getUserStats
      tags: [stats]
      summary: Get user gamification stats (streak, level, badges, XP)
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /stats/badges:
    get:
      operationId: listBadges
      tags: [stats]
      summary: List all earned badges
      responses:
        "200":
          description: Badges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Badge"

  /stats/daily-quote:
    get:
      operationId: getDailyQuote
      tags: [stats]
      summary: Get today's motivational quote
      responses:
        "200":
          description: Daily quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyQuote"

  # ── PDF ────────────────────────────────────────────────────────────────────
  /pdf/parse-tasks:
    post:
      operationId: parsePdfTasks
      tags: [pdf]
      summary: Accept extracted PDF text and return parsed tasks for review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PdfTextInput"
      responses:
        "200":
          description: Parsed task suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PdfTaskSuggestion"

  /pdf/confirm-tasks:
    post:
      operationId: confirmPdfTasks
      tags: [pdf]
      summary: Confirm and save selected parsed tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PdfTaskConfirmInput"
      responses:
        "201":
          description: Saved tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Task schemas ──────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, title, status, priority, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, completed, missed]
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: ["string", "null"]
        dueTime:
          type: ["string", "null"]
        tagId:
          type: ["integer", "null"]
        tagName:
          type: ["string", "null"]
        tagColor:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        fromPdf:
          type: boolean

    TaskInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
        dueTime:
          type: string
        tagId:
          type: integer
        fromPdf:
          type: boolean

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
        dueTime:
          type: string
        tagId:
          type: integer
        status:
          type: string
          enum: [pending, completed, missed]

    RescheduleInput:
      type: object
      required: [dueDate]
      properties:
        dueDate:
          type: string
        dueTime:
          type: string
        note:
          type: string

    TaskSummary:
      type: object
      required: [total, completed, pending, missed]
      properties:
        total:
          type: integer
        completed:
          type: integer
        pending:
          type: integer
        missed:
          type: integer
        completionRate:
          type: number

    # ── Habit schemas ─────────────────────────────────────────────────────────
    Habit:
      type: object
      required: [id, name, streak, currentStreak, level, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        icon:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        streak:
          type: integer
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        level:
          type: integer
        completedToday:
          type: boolean
        lastChecked:
          type: ["string", "null"]
        tagId:
          type: ["integer", "null"]
        createdAt:
          type: string

    HabitInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        icon:
          type: string
        color:
          type: string
        tagId:
          type: integer

    HabitUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        icon:
          type: string
        color:
          type: string
        tagId:
          type: integer

    # ── Finance schemas ───────────────────────────────────────────────────────
    FinanceEntry:
      type: object
      required: [id, type, amount, category, date, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        category:
          type: string
        description:
          type: ["string", "null"]
        date:
          type: string
        dueDate:
          type: ["string", "null"]
        isPaid:
          type: boolean
        tagId:
          type: ["integer", "null"]
        createdAt:
          type: string

    FinanceInput:
      type: object
      required: [type, amount, category, date]
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
          minLength: 1
        description:
          type: string
        date:
          type: string
        dueDate:
          type: string
        isPaid:
          type: boolean
        tagId:
          type: integer

    FinanceUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          minimum: 0.01
        category:
          type: string
        description:
          type: string
        date:
          type: string
        dueDate:
          type: string
        isPaid:
          type: boolean
        tagId:
          type: integer

    CategoryBreakdown:
      type: object
      required: [category, total, count]
      properties:
        category:
          type: string
        total:
          type: number
        count:
          type: integer
        percentage:
          type: number

    MonthlySummary:
      type: object
      required: [month, totalIncome, totalExpenses, netBalance, expensesByCategory]
      properties:
        month:
          type: string
        totalIncome:
          type: number
        totalExpenses:
          type: number
        netBalance:
          type: number
        expensesByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryBreakdown"
        incomeByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryBreakdown"

    # ── Tag schemas ───────────────────────────────────────────────────────────
    Tag:
      type: object
      required: [id, name, color, isCustom, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        icon:
          type: ["string", "null"]
        isCustom:
          type: boolean
        createdAt:
          type: string

    TagInput:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
        icon:
          type: string

    # ── Stats schemas ─────────────────────────────────────────────────────────
    UserStats:
      type: object
      required: [dailyStreak, level, xp, xpToNextLevel, totalTasksCompleted, totalHabitsChecked, badges]
      properties:
        dailyStreak:
          type: integer
        level:
          type: integer
        xp:
          type: integer
        xpToNextLevel:
          type: integer
        totalTasksCompleted:
          type: integer
        totalHabitsChecked:
          type: integer
        badges:
          type: integer
        weeklyCompletionRate:
          type: number
        streakBroken:
          type: boolean
        allTasksCompletedToday:
          type: boolean

    Badge:
      type: object
      required: [id, name, description, icon, earnedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        earnedAt:
          type: string
        rarity:
          type: string
          enum: [common, rare, epic, legendary]

    DailyQuote:
      type: object
      required: [quote, author]
      properties:
        quote:
          type: string
        author:
          type: string
        date:
          type: string

    # ── PDF schemas ───────────────────────────────────────────────────────────
    PdfTextInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1

    PdfTaskSuggestion:
      type: object
      required: [title, confidence]
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        priority:
          type: string
          enum: [low, medium, high]
        confidence:
          type: number

    PdfTaskConfirmInput:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TaskInput"
